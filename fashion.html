<!DOCTYPE html>
<html>
<head>

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            text-align: center;
        }

        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>

</head>
<body>

<h2>✨ Fashion Bangles Collection</h2>

<div class="container">

    <div class="card">
        <img src="https://tse3.mm.bing.net/th/id/OIP.zx5m6JzAJ6Digw1k3DybZgHaHa">
        <p>₹500</p>
    </div>

    <div class="card">
        <img src="https://tse4.mm.bing.net/th/id/OIP.3Qh0P9lX7RkYbUQpG-8n6QHaHa">
        <p>₹700</p>
    </div>

    <div class="card">
        <img src="https://tse1.mm.bing.net/th/id/OIP.YNPE0lm2WyVxiOGHtGH3OwHaHk">
        <p>₹600</p>
    </div>

</div>

</body>
</html>
